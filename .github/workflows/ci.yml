name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-institute/.github/.github/workflows/swift-ci.yml
  ci:
    uses: swift-institute/.github/.github/workflows/swift-ci.yml@v1
    with:
      cache-key-prefix: swift63-spm-v1
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

  # DocC umbrella-catalog pipeline per [DOC-019a] — see
  # swift-institute/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@v1
    with:
      umbrella-module: Witness_Primitives
      umbrella-display-name: "Witness Primitives"
      umbrella-bundle-id: "swift-witness-primitives.Witness-Primitives"
      umbrella-docc-path: "Sources/Witness Primitives/Witness Primitives.docc"
      exclude-modules: ""
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
